services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: applens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applens}
      POSTGRES_USER: ${POSTGRES_USER:-applens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: applens-backend:${TAG:-latest}
    container_name: applens-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-applens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-applens}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_GITHUB_HOST: ${MCP_GITHUB_HOST:-localhost}
      MCP_GITHUB_PORT: ${MCP_GITHUB_PORT:-8000}
      ENVIRONMENT: production
      FRONTEND_URL: https://${DOMAIN}
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: applens-frontend:${TAG:-latest}
    container_name: applens-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - backend

  proxy:
    image: caddy:alpine
    container_name: applens-proxy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
